name: Security Test Suite

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: auth-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start services
        working-directory: auth-service
        run: docker compose up -d

      - name: Wait for auth-service
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "auth-service did not become ready in time"
          docker compose -f auth-service/docker-compose.yml logs
          exit 1

      - name: Run security tests
        working-directory: auth-service
        run: make test-security

      - name: Show logs on failure
        if: failure()
        run: docker compose -f auth-service/docker-compose.yml logs

      - name: Shutdown services
        if: always()
        run: docker compose -f auth-service/docker-compose.yml down -v
