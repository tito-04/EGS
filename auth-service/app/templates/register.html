<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Auth - Register</title>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Create your EGS account</h1>
      <p class="subtitle">One account to access Flash Sale and Payment.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/ui/register">
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="state" value="{{ state }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="full_name">Full name</label>
        <input id="full_name" name="full_name" type="text" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="8">

        <button type="submit">Create account</button>
      </form>
      <p class="small-link">
        Already have an account?
        <a href="/ui/login?client_id={{ client_id }}&redirect_uri={{ redirect_uri }}{% if state %}&state={{ state }}{% endif %}">Sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
