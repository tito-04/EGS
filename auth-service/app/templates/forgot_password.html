<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Auth - Forgot Password</title>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your email and we will send reset instructions.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      {% if message %}
      <p class="success">{{ message }}</p>
      {% endif %}
      <form method="post" action="/ui/forgot-password">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <button type="submit">Send reset link</button>
      </form>
      <p class="small-link">
        <a href="/ui/login{% if redirect_uri %}?client_id={{ client_id }}&redirect_uri={{ redirect_uri }}{% endif %}">Back to sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
