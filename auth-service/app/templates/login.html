<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Auth - Login</title>
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Sign in to EGS</h1>
      <p class="subtitle">Use your central account to continue.</p>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/ui/login">
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="state" value="{{ state }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required minlength="8">

        <button type="submit">Sign In</button>
      </form>
      <p class="small-link">
        <a href="/ui/forgot-password?client_id={{ client_id }}&redirect_uri={{ redirect_uri }}">Forgot your password?</a>
      </p>
      <p class="small-link">
        New here?
        <a href="/ui/register?client_id={{ client_id }}&redirect_uri={{ redirect_uri }}{% if state %}&state={{ state }}{% endif %}">Create account</a>
      </p>
    </section>
  </main>
</body>
</html>
