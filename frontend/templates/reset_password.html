<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Auth - Reset Password</title>
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Reset your password</h1>
      <p class="subtitle">Choose a new password for your account.</p>
      
      <p id="error-message" class="error" style="display: none;"></p>
      <p id="success-message" class="success" style="display: none;"></p>
      
      <form id="reset-form">
        <label for="new_password">New password</label>
        <input id="new_password" name="new_password" type="password" required minlength="8">

        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" required minlength="8">

        <button type="submit">Update password</button>
      </form>
      <p class="small-link">
        <a href="login.html" id="back-link">Back to sign in</a>
      </p>
    </section>
  </main>
  <script>
    const API_URL = "http://auth.flashsale/api/v1";

    function extractErrorMessage(payload, fallback) {
      if (!payload) {
        return fallback;
      }
      if (typeof payload.detail === "string") {
        return payload.detail;
      }
      if (Array.isArray(payload.detail)) {
        const first = payload.detail[0];
        if (typeof first === "string") {
          return first;
        }
        if (first && first.msg) {
          return first.msg;
        }
      }
      if (payload.detail && typeof payload.detail === "object" && payload.detail.msg) {
        return payload.detail.msg;
      }
      return fallback;
    }

    // Extract token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    function buildLoginUrl() {
      const forwarded = new URLSearchParams(window.location.search);
      forwarded.delete("token");
      const query = forwarded.toString();
      return query ? `login.html?${query}` : "login.html";
    }

    document.getElementById("back-link").href = buildLoginUrl();

    if (!token) {
      document.getElementById("error-message").textContent = "Invalid or missing reset token.";
      document.getElementById("error-message").style.display = "block";
      document.querySelector("button").disabled = true;
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const newPassword = document.getElementById("new_password").value;
      const confirmPassword = document.getElementById("confirm_password").value;
      const errorMsg = document.getElementById("error-message");
      const successMsg = document.getElementById("success-message");
      const btn = e.target.querySelector("button");

      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      if (newPassword !== confirmPassword) {
        errorMsg.textContent = "Passwords do not match.";
        errorMsg.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating...";

      try {
        const response = await fetch(`${API_URL}/auth/reset-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            token: token,
            new_password: newPassword
          })
        });

        let data = null;
        try {
          data = await response.json();
        } catch (_) {
          data = null;
        }

        if (!response.ok) {
          throw new Error(extractErrorMessage(data, "Failed to reset password."));
        }

        successMsg.textContent = "Password updated successfully. Redirecting to login...";
        successMsg.style.display = "block";

        setTimeout(() => {
          window.location.href = buildLoginUrl();
        }, 2000);

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Update password";
      }
    });
  </script>
</body>
</html>
