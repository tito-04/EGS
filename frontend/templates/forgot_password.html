<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EGS Auth - Forgot Password</title>
  <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <h1>Forgot your password?</h1>
      <p class="subtitle">Enter your email and we will send reset instructions.</p>
      
      <p id="error-message" class="error" style="display: none;"></p>
      <p id="success-message" class="success" style="display: none;"></p>
      
      <form id="forgot-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <button type="submit">Send reset link</button>
      </form>
      <p class="small-link">
        <a href="login.html" id="back-link">Back to sign in</a>
      </p>
    </section>
  </main>
  <script>
    const API_URL = "http://localhost:8000/api/v1";

    function extractErrorMessage(payload, fallback) {
      if (!payload) {
        return fallback;
      }
      if (typeof payload.detail === "string") {
        return payload.detail;
      }
      if (Array.isArray(payload.detail)) {
        const first = payload.detail[0];
        if (typeof first === "string") {
          return first;
        }
        if (first && first.msg) {
          return first.msg;
        }
      }
      if (payload.detail && typeof payload.detail === "object" && payload.detail.msg) {
        return payload.detail.msg;
      }
      return fallback;
    }

    document.getElementById("forgot-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const email = document.getElementById("email").value;
      const errorMsg = document.getElementById("error-message");
      const successMsg = document.getElementById("success-message");
      const btn = e.target.querySelector("button");

      errorMsg.style.display = "none";
      successMsg.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        const response = await fetch(`${API_URL}/auth/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        let data = null;
        try {
          data = await response.json();
        } catch (_) {
          data = null;
        }

        if (!response.ok) {
          throw new Error(extractErrorMessage(data, "Failed to send reset link."));
        }

        successMsg.textContent = data?.message || "If this email is registered, you will receive reset instructions shortly.";
        successMsg.style.display = "block";

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    });
  </script>
</body>
</html>
